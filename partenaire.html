<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Partenaire</title><link rel="stylesheet" href="style.css"></head><body><header><h1>Devenir coiffeur partenaire</h1><a href="index.html" style="color:white">Retour accueil</a></header><div class="wrap"><div class="box"><form id="pf"><input id="pn" required placeholder="Nom et prénom"><input id="pt" required placeholder="Téléphone / WhatsApp"><input id="pe" type="email" placeholder="Email"><input id="pc" required placeholder="Commune"><input id="pq" required placeholder="Quartier"><input id="px" type="number" min="0" required placeholder="Années d'expérience"><textarea id="ps" required placeholder="Spécialités"></textarea><input id="pz" required placeholder="Zone d'intervention"><input id="pd" placeholder="Disponibilités"><textarea id="pg" placeholder="Liens vers vos photos de réalisations"></textarea><button>Envoyer ma candidature</button></form><div id="pm"></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";import{getFirestore,collection,addDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";import{firebaseConfig}from"./firebase-config.js";const db=getFirestore(initializeApp(firebaseConfig));pf.onsubmit=async e=>{e.preventDefault();try{await addDoc(collection(db,"candidatures_coiffeurs"),{nom:pn.value,telephone:pt.value,email:pe.value,commune:pc.value,quartier:pq.value,experience:px.value,specialites:ps.value,zone:pz.value,disponibilites:pd.value,galerie:pg.value,statut:"En attente",dateCreation:new Date().toISOString()});pm.innerHTML="<p class=notice>Candidature envoyée.</p>";pf.reset()}catch(x){pm.textContent=x.message}};</script></body></html>
